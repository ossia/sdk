name: "Compute core SDK hash"
description: >
  Compute a deterministic content hash of the CORE build inputs for a given
  platform, so core.yml (producer) and media.yml (consumer) agree on which
  published core release to use. THIS IS THE CONTRACT between the two workflows:
  both must call this action so the hash is computed by identical code.

inputs:
  platform:
    description: "linux | macos | windows"
    required: true
  arch:
    description: "matrix arch (x86_64 | aarch64 | arm64) — only used to label the tag"
    required: true

outputs:
  core_hash:
    description: "12-hex-char content hash of the core inputs for this platform"
    value: ${{ steps.h.outputs.core_hash }}
  core_tag:
    description: "core-<platform>-<arch>-<hash> — the GitHub release tag for this core"
    value: ${{ steps.h.outputs.core_tag }}

runs:
  using: "composite"
  steps:
    - id: h
      shell: bash
      run: |
        set -euo pipefail
        platform='${{ inputs.platform }}'
        arch='${{ inputs.arch }}'

        # Files shared by every platform's core: the clone scripts that carry
        # the actual upstream pins / cherry-picks / patches. NB: common/versions.sh
        # is deliberately NOT hashed as a whole file -- only the CORE version vars
        # are folded in below, so a media-only bump (SDL_VERSION, FFMPEG_VERSION,
        # ...) does NOT rotate the core hash and media keeps reusing the same core.
        common_files=(
          common/clone-llvm.sh
          common/clone-qt.sh
          common/clone-freetype.sh
          common/clone-zlib.sh
          common/clone-openssl.sh
          common/clone-cmake.sh
          common/qtmodules
          common/qtfeatures
        )

        case "$platform" in
          linux)
            plat_files=(
              Linux/llvm.sh Linux/qt.sh Linux/openssl.sh Linux/freetype.sh
              Linux/zlib.sh Linux/cmake.sh Linux/common.sh
              Linux/build-all.sh Linux/build-all-release.sh Linux/create-sdk.sh
              Linux/CentOS/common.release.sh Linux/Dockerfile.centos
            )
            ;;
          macos)
            plat_files=(
              macOS/llvm-libs.sh macOS/qt.sh macOS/freetype.sh
              macOS/common.sh macOS/all.sh macOS/deps.sh
            )
            ;;
          windows)
            plat_files=(
              MSYS/llvm.sh MSYS/llvm-deps.sh MSYS/qt.sh MSYS/freetype.sh
              MSYS/zlib.sh MSYS/cmake.sh MSYS/common.sh MSYS/all.sh MSYS/deps.sh
            )
            ;;
          *) echo "core-hash: unknown platform '$platform'" >&2; exit 1 ;;
        esac

        # Hash existing files only (a renamed/removed input still changes the
        # hash via the surviving files + the list itself). Sort for determinism.
        files=()
        for f in "${common_files[@]}" "${plat_files[@]}"; do
          [[ -f "$f" ]] && files+=("$f")
        done
        # NB: common/patches/ currently holds only media patches (ffmpeg), so it
        # is intentionally NOT folded in here — it belongs to the media hash.
        # Qt patches live inside common/clone-qt.sh, which is already hashed.

        # Only the CORE version pins from versions.sh (NOT media ones). Keep this
        # list in sync with what the core stage actually builds.
        core_versions=$(grep -E \
          '^export (LLVM_VERSION|LLVM_MINGW_VERSION|OPENSSL_VERSION|QT_VERSION|CMAKE_VERSION|CMAKE_VERSION_SHORT|PYTHON_VERSION)=' \
          common/versions.sh | LC_ALL=C sort)

        hash=$( { printf '%s\n' "${files[@]}" | LC_ALL=C sort -u | xargs sha256sum; \
                  printf '%s\n' "$core_versions"; } | sha256sum | cut -c1-12)

        echo "core_hash=$hash" >> "$GITHUB_OUTPUT"
        echo "core_tag=core-${platform}-${arch}-${hash}" >> "$GITHUB_OUTPUT"
        echo "Core hash for ${platform}/${arch}: $hash" >> "$GITHUB_STEP_SUMMARY"
