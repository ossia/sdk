name: Build SDK

# Builds the ossia SDK for every supported platform/arch and uploads each
# result as a CI artifact. amd64 + arm64 for Linux, macOS and Windows.
#
# Status of each leg (validated locally where possible; CI legs still need a
# first real run to shake out runner-specific issues):
#   - linux/x86_64   : Linux/create-sdk.sh   (Docker, CPU_ARCH=x86_64)  -- exercised locally
#   - linux/aarch64  : Linux/create-sdk.sh   (Docker, CPU_ARCH=aarch64) on native arm64 runner
#   - macos/arm64    : macOS/all.sh          (TARGET_ARCH=arm64)
#   - macos/x86_64   : macOS/all.sh          (TARGET_ARCH=x86_64)
#   - windows/x86_64 : MSYS/all.sh           (MSYS2 CLANG64)            -- see TODOs below
#   - windows/arm64  : MSYS/all.sh           (MSYS2 CLANGARM64)         -- new, scripts need arch work
#
# Windows notes:
#   * Python + meson come from MSYS2 (deps.sh: mingw-w64-<toolchain>-python/-meson).
#     Do NOT inherit the runner PATH (see setup-msys2 step): the runner's MSVC
#     clang would shadow the mingw toolchain and deps would build as .lib not .a.
#   * arm64: the MSYS tree is now parametrized on TARGET_ARCH (x86_64 | arm64) via
#     MSYS/common.sh -> install prefix, MSYS2 toolchain, mingw triple, cmake +
#     llvm-mingw download arch. Both legs go through the same scripts.
# Kept continue-on-error until a first real CI run confirms both legs are green
# (windows-on-arm runner + some MSYS2 aarch64 packages are still unproven).
#
# Caching: the concurrency block above cancels superseded runs on a new push.
# ccache (persisted via actions/cache) fronts the cmake-based steps (LLVM, Qt,
# ...) on Linux and macOS for fast re-runs; Windows ccache is deferred until that
# leg builds green.

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-linux-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: ccache-linux-${{ matrix.arch }}-

      - name: Prepare install prefix
        run: |
          sudo mkdir -p /opt/ossia-sdk-${{ matrix.arch }}
          sudo chmod 0777 /opt/ossia-sdk-${{ matrix.arch }}

      - name: Build SDK (Docker)
        working-directory: Linux
        env:
          CPU_ARCH: ${{ matrix.arch }}
          # create-sdk.sh mounts this into the container and turns on the cmake
          # compiler launcher; ccache itself is installed in the Docker image.
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ./create-sdk.sh

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-linux-${{ matrix.arch }}
          path: Linux/sdk-linux-${{ matrix.arch }}.tar.xz
          if-no-files-found: error

  macos:
    name: macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            prefix_arch: aarch64
            runner: macos-15
          - arch: x86_64
            prefix_arch: x86_64
            # Cross-build x86_64 on an Apple Silicon runner (TARGET_ARCH=x86_64 ->
            # -arch x86_64;x86_64h) instead of the scarce/deprecated macos-13 Intel runner.
            runner: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-macos-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: ccache-macos-${{ matrix.arch }}-

      - name: Prepare install prefix
        run: |
          sudo mkdir -p /opt/ossia-sdk-${{ matrix.prefix_arch }}
          sudo chown "$(whoami)" /opt/ossia-sdk-${{ matrix.prefix_arch }}

      - name: Build SDK
        working-directory: macOS
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          # ccache (installed via deps.sh) fronts every cmake-based step
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_COMPILERCHECK: content
          CCACHE_MAXSIZE: 3G
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          ./deps.sh
          source ./common.sh
          ./all.sh

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-macos-${{ matrix.arch }}
          path: macOS/sdk-macOS-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  windows:
    name: windows-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    # TODO: drop once the MSYS Python provisioning + arm64 parametrization land.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-2022
            msystem: CLANG64
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          # NB: do NOT use path-type: inherit -- it puts the runner's
          # C:/Program Files/LLVM (MSVC-target clang) ahead of /clang64/bin, so
          # early deps build as MSVC .lib instead of mingw .a and Qt can't link
          # them. Python+meson come from MSYS2 (deps.sh) instead.
          install: git wget tar unzip diffutils yasm

      - name: Build SDK
        working-directory: MSYS
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          ./deps.sh
          ./all.sh

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-windows-${{ matrix.arch }}
          path: MSYS/sdk-mingw-*.7z
          if-no-files-found: warn
